# Build Astro + déploiement sur GitHub Pages.
# Prérequis : Settings → Pages → Source = « GitHub Actions » (sinon GitHub
# lance son build Jekyll par défaut, incompatible avec les fichiers .astro).
name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4